<!DOCTYPE html>
<html>
<head>
  <title></title>
</head>
<style type="text/css">
  button {
    padding: 20px;
    margin: 50px;
  }
</style>

<script type="text/javascript">
  function openWidget(source) {
    console.log(source);
    setVisitorInfo(source);
    openwidget();
    //const myTimeout = setTimeout(openwidget, 500);

  }

  function openwidget() {
    console.log('openwidget ');
    Netomi.chat.openWidget();
    var conversationInitiated = document.cookie.match(/(?:^|;\s*)net_conversationInitiated=([^;]+)/)?.[1];
    console.log(conversationInitiated)

  }

  function setVisitorInfo(button_source) {
    window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
        BUTTON_SOURCE: button_source
    });
  }

  var botRefId = "938dcb64-4141-4347-984b-1090f15c66a1";


  (function() {
    var ns = document.createElement("script");
    ns.src = "https://chatapps-us.netomi.com/app/script.js";
    ns.type = "text/javascript";
    ns.async = true;
ns.setAttribute('enableEventQueue', 'true');
    ns.setAttribute("botRefId", botRefId);
    var s = document.getElementsByTagName("script")[0];
    s.parentNode.insertBefore(ns, s);
    ns.onload = function() {

      // Ensure Netomi exists before using
          if (window.Netomi && Netomi.chat) {

            // Handle new conversation event
            Netomi.chat.onNewConversation(function(data) {
              console.log('[ON_NEW_CONVERSATION] New conversation started! ConversationId:', data.conversationId);

              setTimeout(function() {
                console.log('[ON_NEW_CONVERSATION] Async work complete. Calling done() to unblock the widget.');
                data.done(); // IMPORTANT
              }, 1000);
            });

          } else {
            console.error("Netomi.chat not available after script load.");
          }

        Netomi.chat.onLoad(() => {
        });
        window.NETOMI_WEB_WIDGET.init(() => {
            setVisitorInfo('default');
        });
    };
})();
</script>
<body>


  <button onclick="openWidget('start_chat')">Start Chat</button>
  <button onclick="openWidget('call_us')">Call Us</button>

</body>
</html>

<!DOCTYPE html>
<html lang="en-LU" data-market="lu-en" data-country="lu" data-lang="en" data-currency="EUR">
<head>
  <title>Netomi Test</title>
  <style>
    button {
      padding: 20px;
      margin: 50px;
    }
  </style>
</head>

<body>

<button onclick="initializeWidget()">Initialize Widget</button>
<button onclick="openWidget('start_chat')">Start Chat</button>
<button onclick="openWidget('call_us')">Call Us</button>

<script>
var botRefId = "a5addd98-2627-437b-899c-2f97ff2e2b18";

let isSDKReady = false;

function initializeWidget() {
  if (!isSDKReady) {
    console.warn("⏳ SDK not ready yet");
    return;
  }

  console.log("🚀 Initializing widget...");
  Netomi.chat.initializeWidget();
}

function openWidget(source) {
  if (!isSDKReady) {
    console.warn("⏳ SDK not ready yet");
    return;
  }

  console.log("Button clicked:", source);

  window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
    CURRENT_TIME: new Date().toLocaleTimeString(),
    BUTTON_SOURCE: source
  });

  Netomi.chat.showWidget();
  Netomi.chat.openWidget();
}

(function() {
  var ns = document.createElement("script");
  ns.src = "https://chatapps-qa-a.netomi.com/app/script.js?v=" + Date.now(); // cache buster
  ns.async = true;

  ns.setAttribute("botRefId", botRefId);
  ns.setAttribute("enableEventQueue", "true");
  ns.setAttribute("hideOnInit", "true");

  document.body.appendChild(ns);

  ns.onload = function() {
    console.log("✅ Netomi script loaded");

    if (window.Netomi && Netomi.chat) {
      console.log("✅ Netomi.chat available");

      // ✅ SDK readiness (THIS is the key)
      Netomi.chat.onLoad(function () {
        console.log("✅ SDK fully ready");
        isSDKReady = true;
      });

      // ✅ onNewConversation (FALSE CASE)
      Netomi.chat.onNewConversation(function(data) {
        console.log("🔥 New Conversation started");
        console.log("ConversationId:", data.conversationId);

        const startTime = Date.now();

        // Optional trap (detect unexpected done)
        const originalDone = data.done;
        data.done = function() {
          console.log("🚨 done() was CALLED unexpectedly");
          originalDone();
        };

        setTimeout(function() {
          console.log("⏱ Async work finished in", Date.now() - startTime, "ms");
          console.log("❌ NOT calling done() → fallback (~2s should happen)");
          // ❌ intentionally NOT calling data.done()
        }, 1000);
      });

    } else {
      console.error("❌ Netomi.chat not available");
    }
  };
})();
</script>

</body>
</html>

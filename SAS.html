<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netomi done() Test</title>

  <style>
    button {
      padding: 20px;
      margin: 50px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <button onclick="openWidget()">Start Chat</button>

  <script>
    var isWidgetReady = false;

    function openWidget() {
      if (!isWidgetReady) {
        console.warn("⏳ Widget not initialized yet");
        return;
      }

      console.log("🚀 Opening widget...");
      Netomi.chat.openWidget();
    }

    (function () {

      var ns = document.createElement("script");
      ns.src = "https://chatapps-qa-a.netomi.com/app/script.js?v=" + Date.now(); // cache buster
      ns.type = "text/javascript";
      ns.async = true;

      ns.setAttribute("botRefId", "a5addd98-2627-437b-899c-2f97ff2e2b18");
      ns.setAttribute("enableEventQueue", "true");

      document.body.appendChild(ns);

      ns.onload = function () {

        console.log("✅ Netomi script loaded");

        // 🔁 Toggle this
        var SHOULD_CALL_DONE = false;

        if (window.Netomi && Netomi.chat) {

          console.log("✅ Netomi.chat available");

          Netomi.chat.onNewConversation(function (data) {

            console.log("🔥 NEW CONVERSATION EVENT");
            console.log("ConversationId:", data.conversationId);

            const originalDone = data.done;
            data.done = function () {
              console.log("🚨 done() was CALLED");
              originalDone();
            };

            setTimeout(function () {

              console.log("⏱ Async work finished");

              if (SHOULD_CALL_DONE) {
                console.log("✅ Calling done()");
                data.done();
              } else {
                console.log("❌ NOT calling done() — waiting for fallback (~2s)");
              }

            }, 1000);

          });

        } else {
          console.error("❌ Netomi.chat not available");
        }

        // ✅ Initialize widget FIRST
        if (window.NETOMI_WEB_WIDGET) {
          window.NETOMI_WEB_WIDGET.init(() => {
            console.log("✅ Widget initialized");
            isWidgetReady = true;
          });
        } else {
          console.warn("❌ NETOMI_WEB_WIDGET not found");
        }

      };

    })();
  </script>

</body>
</html>

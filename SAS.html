<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netomi done() Test</title>

  <style>
    button {
      padding: 20px;
      margin: 50px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <button onclick="openWidget()">Start Chat</button>

  <script>
    function openWidget() {
      if (window.Netomi && Netomi.chat) {
        Netomi.chat.openWidget();
      } else {
        console.warn("Netomi not ready yet");
      }
    }

    (function () {

      var ns = document.createElement("script");

      // 🔥 Cache buster added
      ns.src = "https://chatapps-qa-a.netomi.com/app/script.js?v=" + Date.now();

      ns.type = "text/javascript";
      ns.async = true;

      ns.setAttribute("botRefId", "a5addd98-2627-437b-899c-2f97ff2e2b18");
      ns.setAttribute("enableEventQueue", "true");

      document.body.appendChild(ns);

      ns.onload = function () {

        console.log("✅ Netomi script loaded");

        // 🔁 TOGGLE THIS
        // true  → done() called
        // false → done() NOT called (timeout fallback)
        var SHOULD_CALL_DONE = false;

        if (window.Netomi && Netomi.chat) {

          console.log("✅ Netomi.chat available");

          Netomi.chat.onNewConversation(function (data) {

            console.log("🔥 NEW CONVERSATION EVENT");
            console.log("ConversationId:", data.conversationId);

            const startTime = Date.now();

            // 🚨 Trap to detect unexpected done() calls
            const originalDone = data.done;
            data.done = function () {
              console.log("🚨 done() was CALLED (either manually or internally)");
              originalDone();
            };

            setTimeout(function () {

              console.log("⏱ Async work finished in:", Date.now() - startTime, "ms");

              if (SHOULD_CALL_DONE) {
                console.log("✅ Calling done() manually");
                data.done();
              } else {
                console.log("❌ NOT calling done() — waiting for SDK timeout fallback (~2s)");
              }

            }, 1000);

          });

        } else {
          console.error("❌ Netomi.chat not available");
        }

        // Init widget AFTER event registration
        if (window.NETOMI_WEB_WIDGET) {
          window.NETOMI_WEB_WIDGET.init(() => {
            console.log("✅ Widget initialized");
          });
        } else {
          console.warn("❌ NETOMI_WEB_WIDGET not found");
        }

      };

    })();
  </script>

</body>
</html>

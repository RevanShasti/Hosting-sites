<script>
(function() {
  var ns = document.createElement('script');
  ns.src = 'https://chatapps-qa-a.netomi.com/app/script.js?v=' + Date.now(); // cache buster
  ns.async = true;

  ns.setAttribute('botRefId', 'a5addd98-2627-437b-899c-2f97ff2e2b18');
  ns.setAttribute("enableEventQueue", "true");

  var s = document.getElementsByTagName('script')[0] || document.body;
  s.parentNode.insertBefore(ns, s);

  ns.onload = function () {
    console.log("Widget script loaded");

    // ✅ Register event BEFORE init
    if (window.Netomi && Netomi.chat) {

      Netomi.chat.onNewConversation(function(data) {
        console.log('[ON_NEW_CONVERSATION] New conversation started! ConversationId:', data.conversationId);

        const startTime = Date.now();

        // 🚨 Trap to detect if SDK calls done() internally
        const originalDone = data.done;
        data.done = function() {
          console.log('🚨 done() was CALLED (unexpected)');
          originalDone();
        };

        setTimeout(function() {
          console.log('[ON_NEW_CONVERSATION] Async work complete after', Date.now() - startTime, 'ms');

          console.log('❌ NOT calling done() → waiting for fallback (~2s)');
          // 🔥 INTENTIONALLY NOT CALLING data.done()

        }, 1000);
      });

    } else {
      console.error("Netomi.chat not available");
    }

    // ✅ Init widget
    if (window.NETOMI_WEB_WIDGET) {
      window.NETOMI_WEB_WIDGET.init(() => {
        console.log("Widget initialized");
      });
    } else {
      console.error("NETOMI_WEB_WIDGET not available");
    }

    // Continue your existing logic
    waitForWidget();
  };

  function waitForWidget() {
    const checkInterval = setInterval(() => {
      const widget = document.getElementById('netomiChatWindow');

      if (widget) {
        clearInterval(checkInterval);
        console.log("Widget iframe detected");

        trackWidget(widget);
      }
    }, 500);
  }

  function trackWidget(widget) {
    let lastState = null;

    const observer = new MutationObserver(() => {
      const style = window.getComputedStyle(widget);

      const isVisible =
        style.display !== "none" &&
        style.visibility !== "hidden" &&
        widget.offsetHeight > 0;

      if (isVisible && lastState !== "open") {
        console.log('[EVENT] Widget opened');
        lastState = "open";
      }

      if (!isVisible && lastState === "open") {
        console.log('[EVENT] Widget minimized/closed');
        lastState = "closed";
      }
    });

    observer.observe(widget, {
      attributes: true,
      attributeFilter: ['style', 'class']
    });
  }

})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netomi Widget Test</title>

  <style>
    button {
      padding: 20px;
      margin: 50px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <button id="startBtn" onclick="openWidget()" disabled>Start Chat</button>

  <script>
    var isChatReady = false;

    function openWidget() {
      if (!isChatReady) {
        console.warn("⏳ Chat not ready yet");
        return;
      }

      console.log("🚀 Opening widget...");
      Netomi.chat.openWidget();
    }

    (function () {

      var ns = document.createElement("script");
      ns.src = "https://chatapps-qa-a.netomi.com/app/script.js?v=" + Date.now();
      ns.async = true;

      ns.setAttribute("botRefId", "a5addd98-2627-437b-899c-2f97ff2e2b18");
      ns.setAttribute("enableEventQueue", "true");

      document.body.appendChild(ns);

      ns.onload = function () {

        console.log("✅ Netomi script loaded");

        var SHOULD_CALL_DONE = false;

        if (window.Netomi && Netomi.chat) {

          console.log("✅ Netomi.chat available");

          // ✅ TRUE readiness signal
          Netomi.chat.onLoad(function () {
            console.log("✅ Chat fully READY");

            isChatReady = true;

            // 🔓 Enable button
            document.getElementById("startBtn").disabled = false;
          });

          // ✅ done() test logic
          Netomi.chat.onNewConversation(function (data) {

            console.log("🔥 NEW CONVERSATION EVENT");
            console.log("ConversationId:", data.conversationId);

            const originalDone = data.done;
            data.done = function () {
              console.log("🚨 done() was CALLED");
              originalDone();
            };

            setTimeout(function () {

              console.log("⏱ Async work finished");

              if (SHOULD_CALL_DONE) {
                console.log("✅ Calling done()");
                data.done();
              } else {
                console.log("❌ NOT calling done() — waiting fallback (~2s)");
              }

            }, 1000);

          });

        } else {
          console.error("❌ Netomi.chat not available");
        }

        if (window.NETOMI_WEB_WIDGET) {
          window.NETOMI_WEB_WIDGET.init(() => {
            console.log("✅ Widget init triggered");
          });
        }

      };

    })();
  </script>

</body>
</html>

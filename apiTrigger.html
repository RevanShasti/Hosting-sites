<!DOCTYPE html>
<html>
<head>
  <title>Netomi API Test</title>
  <style>
    button {
      padding: 20px;
      margin: 20px;
    }
  </style>
</head>

<body>

<button id="startBtn" onclick="openWidget('start_chat')" disabled>
  Start Chat
</button>

<script>
let isInitialized = false;

function openWidget(source) {
  console.log("🚀 Opening widget:", source);

  window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
    BUTTON_SOURCE: source
  });

  Netomi.chat.openWidget();
}

var botRefId = "a5addd98-2627-437b-899c-2f97ff2e2b18";

(function() {
  var ns = document.createElement("script");
  ns.src = "https://chatapps-qa-a.netomi.com/app/script.js?v=" + Date.now();
  ns.async = true;

  ns.setAttribute("botRefId", botRefId);
  ns.setAttribute("enableEventQueue", "true");

  document.body.appendChild(ns);

  ns.onload = function() {
    console.log("✅ Script loaded");

    if (window.Netomi && Netomi.chat) {

      // 🔥 INIT (this is what matters)
      window.NETOMI_WEB_WIDGET.init(() => {
        console.log("✅ Widget initialized");

        isInitialized = true;

        // enable button now
        document.getElementById("startBtn").disabled = false;

        // required initial publish
        window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
          BUTTON_SOURCE: 'default'
        });
      });

      // 🔥 TEST EVENT
      Netomi.chat.onNewConversation(function(data) {
        console.log("🔥 New Conversation:", data.conversationId);

        setTimeout(() => {
          console.log("❌ NOT calling done() → fallback expected");
        }, 1000);
      });

    } else {
      console.error("❌ Netomi not available");
    }
  };
})();
</script>

</body>
</html>

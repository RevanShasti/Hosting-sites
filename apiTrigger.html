<script>
let TEST_MODE = 'success';

function setMode(mode) {
  TEST_MODE = mode;
  console.log("🔁 Test mode set to:", mode);
}

function openWidget(source) {
  console.log("Opening widget:", source);

  window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
    BUTTON_SOURCE: source
  });

  Netomi.chat.openWidget();
}

var botRefId = "a5addd98-2627-437b-899c-2f97ff2e2b18";

(function() {
  var ns = document.createElement("script");
  ns.src = "https://chatapps-qa-a.netomi.com/app/script.js?v=" + Date.now();
  ns.async = true;

  ns.setAttribute('enableEventQueue', 'true');
  ns.setAttribute("botRefId", botRefId);

  var s = document.getElementsByTagName("script")[0];
  s.parentNode.insertBefore(ns, s);

  ns.onload = function() {

    if (window.Netomi && Netomi.chat) {

      // ✅ EVENT
      Netomi.chat.onNewConversation(function(data) {
        console.log("🔥 New Conversation:", data.conversationId);
        console.log("📡 Mode:", TEST_MODE);

        const startTime = Date.now();

        simulateAPI(TEST_MODE)
          .then(() => {
            console.log("✅ API Success");

            if (TEST_MODE === 'success') {
              data.done();
            }
          })
          .catch(() => {
            console.log("❌ API Failed");
          });

      });

      // ✅ IMPORTANT: INIT PROPERLY
      window.NETOMI_WEB_WIDGET.init(() => {
        console.log("✅ Widget initialized");

        // 🔥 THIS FIXES YOUR TIMEOUT ISSUE
        window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
          BUTTON_SOURCE: 'default'
        });
      });

    } else {
      console.error("Netomi not available");
    }

  };
})();

function simulateAPI(mode) {
  return new Promise((resolve, reject) => {

    if (mode === 'success') {
      setTimeout(() => resolve(), 1000);
    }

    else if (mode === 'failure') {
      setTimeout(() => reject(), 1000);
    }

    else if (mode === 'slow') {
      setTimeout(() => resolve(), 3000);
    }

  });
}
</script>

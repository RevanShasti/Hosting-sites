<!DOCTYPE html>
<html lang="en-LU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAS Fix - Final</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: auto;
      font-family: Arial, sans-serif;
    }

    .page-container {
      height: 100dvh;
      background: #f5f5f5;
    }

    .content {
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    #contactServiceBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 16px;
      background: #0051ff;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 9999;
    }

    #popup {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 250px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      padding: 15px;
      z-index: 9999;
    }

    .option-btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="page-container">
  <div class="content">
    <h2>SAS Replica (Final Fix)</h2>
    <p>Testing chat widget full screen issue.</p>
    <div style="height:1500px;"></div>
  </div>
</div>

<button id="contactServiceBtn">Need to contact customer service</button>

<div id="popup">
  <p>Contact options</p>
  <button class="option-btn" id="chatBtn">💬 Chat</button>
</div>

<!-- Netomi Script -->
<script>
var botRefId = "a5addd98-2627-437b-899c-2f97ff2e2b18";

(function() {
  var ns = document.createElement("script");
  ns.src = "https://chatapps-qa-a.netomi.com/app/script.js";
  ns.type = "text/javascript";
  ns.async = true;

  ns.setAttribute("enableEventQueue", "true");
  ns.setAttribute("botRefId", botRefId);
  ns.setAttribute("hideOnInit", "true");

  ns.onload = function () {
    console.log("✅ Netomi script loaded");
  };

  ns.onerror = function () {
    console.error("❌ Netomi script failed to load");
  };

  document.head.appendChild(ns);
})();
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("contactServiceBtn");
  const popup = document.getElementById("popup");
  const chatBtn = document.getElementById("chatBtn");

  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    popup.style.display = popup.style.display === "block" ? "none" : "block";
  });

  chatBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    popup.style.display = "none";
    openWidget("start_chat");
  });

  document.addEventListener("click", function (e) {
    if (!popup.contains(e.target) && e.target !== btn) {
      popup.style.display = "none";
    }
  });

});

function openWidget(source) {
  console.log("Opening widget with source:", source);

  if (window.NETOMI_WEB_WIDGET) {
    setVisitorInfo(source);
  }

  waitForNetomi();
}

function waitForNetomi() {
  if (window.Netomi && window.Netomi.chat) {

    console.log("✅ Netomi ready");

    // Initialize (required for hideOnInit = true)
    window.Netomi.chat.initializeWidget();

    setTimeout(function () {

      if (window.Netomi.chat.showWidget) {
        window.Netomi.chat.showWidget();
      }

      window.Netomi.chat.openWidget();

      // Fix fullscreen issue
      setTimeout(function () {
        window.dispatchEvent(new Event('resize'));
      }, 300);

    }, 300);

  } else {
    console.log("⏳ Waiting for Netomi...");
    setTimeout(waitForNetomi, 500);
  }
}

function setVisitorInfo(source) {
  if (window.NETOMI_WEB_WIDGET) {
    window.NETOMI_WEB_WIDGET.publish('VISITOR_INFO', {
      CURRENT_TIME: new Date().toLocaleTimeString(),
      BUTTON_SOURCE: source
    });
  }
}
</script>

</body>
</html>

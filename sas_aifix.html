<!DOCTYPE html>
<html lang="en-LU" data-market="lu-en" data-country="lu" data-lang="en" data-currency="EUR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAS Fixed Version - Chat Fullscreen Fix</title>

  <style>
    /* ✅ FIXED: allow full expansion */
    html, body {
      height: 100%;
      margin: 0;
      overflow: auto; /* FIX: removed hidden */
      font-family: Arial, sans-serif;
    }

    /* ✅ FIXED: use dynamic viewport */
    .page-container {
      height: 100dvh; /* FIX: replaced 100vh */
      position: relative;
      background: #f5f5f5;
    }

    .content {
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    /* Button (unchanged UI) */
    #contactServiceBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 16px;
      background: #0051ff;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 9999;
    }

    #popup {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 250px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      padding: 15px;
      z-index: 9999;
    }

    .option-btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
    }

    /* ✅ EXTRA SAFETY: ensure Netomi iframe always fits screen */
    iframe[src*="netomi"] {
      height: 100dvh !important;
      max-height: 100dvh !important;
      top: 0 !important;
      bottom: 0 !important;
      position: fixed !important;
    }

  </style>
</head>

<body>

<div class="page-container">
  <div class="content">
    <h2>SAS Support Page (Fixed Version)</h2>
    <p>This version includes SAS-side fixes for mobile chat fullscreen issue.</p>
    <div style="height: 1500px;"></div>
  </div>
</div>

<button id="contactServiceBtn">Need to contact customer service</button>

<div id="popup">
  <p>Contact options</p>
  <button class="option-btn" id="chatBtn">💬 Chat</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("contactServiceBtn");
  const popup = document.getElementById("popup");
  const chatBtn = document.getElementById("chatBtn");

  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    popup.style.display = popup.style.display === "block" ? "none" : "block";
  });

  chatBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    popup.style.display = "none";
    openWidget('start_chat');
  });

  document.addEventListener("click", function (e) {
    if (!popup.contains(e.target) && e.target !== btn) {
      popup.style.display = "none";
    }
  });

});

function openWidget(source) {
  console.log('Opening widget with source:', source);

  if (window.NETOMI_WEB_WIDGET) {
    setVisitorInfo(source);
  }

  triggerChat();
}

function triggerChat() {
  try {
    if (window.Netomi && window.Netomi.chat) {
      window.Netomi.chat.initializeWidget();
    } else if (window.Netomi) {
      window.Netomi.chat.initializeWidget();
    }
  } catch (e) {}

  waitForNetomiAndOpen();
}

function waitForNetomiAndOpen() {
  if (window.Netomi && window.Netomi.chat) {

    console.log('Netomi ready after init');

    setTimeout(function () {

      if (window.Netomi.chat.showWidget) {
        window.Netomi.chat.showWidget();
      }

      window.Netomi.chat.openWidget();

      setTimeout(function () {
        window.dispatchEvent(new Event('resize'));
      }, 300);

    }, 300);

  } else {
    setTimeout(waitForNetomiAndOpen, 300);
  }
}
</script>
</body>
</html>

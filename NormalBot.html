
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netomi Widget Tracking</title>
</head>
<body>

  <button onclick="openSupport()">Support</button>

  <script>
    function openSupport() {
      if (window.Netomi && Netomi.chat) {
        console.log('[EVENT] Widget opened');
        Netomi.chat.openWidget();
      } else {
        console.warn("Netomi not loaded yet");
      }
    }

    (function() {
      var ns = document.createElement('script');
      ns.src = 'https://chatapps-qa-a.netomi.com/app/script.js';
      ns.async = true;

      ns.setAttribute('botRefId', 'a5addd98-2627-437b-899c-2f97ff2e2b18');
      ns.setAttribute("enableEventQueue", "true");

      var s = document.getElementsByTagName('script')[0] || document.body;
      s.parentNode.insertBefore(ns, s);

      ns.onload = function () {

        if (window.NETOMI_WEB_WIDGET) {
          window.NETOMI_WEB_WIDGET.init(() => {
            console.log("Widget initialized");
          });
        }

        // 🔥 OBSERVE WIDGET DOM CHANGES
        observeWidget();
      };

      function observeWidget() {
        let lastState = "unknown";

        const observer = new MutationObserver(() => {
          const widget = document.querySelector('iframe[src*="netomi"]');

          if (!widget) return;

          const style = window.getComputedStyle(widget);
          const isVisible = style.display !== "none" && style.visibility !== "hidden";

          if (isVisible && lastState !== "open") {
            console.log('[EVENT] Widget opened (UI)');
            lastState = "open";
          }

          if (!isVisible && lastState === "open") {
            console.log('[EVENT] Widget closed/minimized (UI)');
            lastState = "closed";
          }
        });

        observer.observe(document.body, {
          childList: true,
          subtree: true,
          attributes: true
        });
      }

    })();
  </script>

</body>
</html>

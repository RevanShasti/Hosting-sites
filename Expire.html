<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Standards" />
  <title>Web Chat</title>
</head>

<body>
  <button onclick="handleAuth()">Start Authentication</button>
  <button onclick="endAuth()">Clear Authentication</button>
</body>
<script>
  let tokenExpired = false;

  async function handleAuth() {

    const tokenApiCall = await fetch(
      'https://chatapps-qa-a.netomi.com/api/fetchJWT',
      {
        method: 'post',
        headers: {
          'href':
            'https://revanshasti.github.io/Hosting-sites/Authentication.html',
          'Content-Type': 'application/json',
          'x-token-expiry': '2m',
          'x-bot-ref-id':
            'a5addd98-2627-437b-899c-2f97ff2e2b18',
          'x-user-details': JSON.stringify({
            name: 'Revan Shasti',
            externalId: 'revan@gmail.com'
          })
        }
      }
    );

    const { token } = await tokenApiCall.json();

    window.NETOMI_WEB_WIDGET.authModule.login(token);

    console.log('Authenticated successfully');

    // AFTER 2 MINUTES MARK TOKEN AS EXPIRED
    setTimeout(() => {
      tokenExpired = true;
      console.log('Token officially expired');
    }, 120000);

    // Widget attempts token refresh
    window.NETOMI_WEB_WIDGET.authModule.jwtAuth(
      async sendTokenToNetomi => {

        console.log('Widget requested token refresh');

        // SIMULATE EXPIRED TOKEN FAILURE
        if (tokenExpired) {

          console.error('Token expired - session failed');

          // send invalid token / no token
          sendTokenToNetomi(
            { token: null },
            null
          );

          return;
        }

        // BEFORE EXPIRY -> NORMAL TOKEN
        const refreshCall = await fetch(
          'https://chatapps-qa-a.netomi.com/api/fetchJWT',
          {
            method: 'post',
            headers: {
              'href':
                'https://revanshasti.github.io/Hosting-sites/Authentication.html',
              'Content-Type': 'application/json',
              'x-token-expiry': '2m',
              'x-bot-ref-id':
                'a5addd98-2627-437b-899c-2f97ff2e2b18',
              'x-user-details': JSON.stringify({
                name: 'Revan Shasti',
                externalId: 'revan@gmail.com'
              })
            }
          }
        );

        const tokenResp = await refreshCall.json();

        sendTokenToNetomi(tokenResp);
      }
    );
  }
</script>
</html>

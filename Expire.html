<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Standards" />
  <title>JWT Expiry Test</title>
</head>

<body>

  <button onclick="handleAuth()">
    Start Authentication
  </button>

  <button onclick="endAuth()">
    Clear Authentication
  </button>

  <script>

    // LOAD NETOMI WIDGET
    (function () {

      var ns = document.createElement('script');

      ns.src = 'https://chatapps-qa-a.netomi.com/app/script.js';

      ns.type = 'text/javascript';

      ns.async = true;

      ns.setAttribute(
        'botRefId',
        'a5addd98-2627-437b-899c-2f97ff2e2b18'
      );

      var s = document.getElementsByTagName('script')[0];

      s.parentNode.insertBefore(ns, s);

      ns.onload = function () {

        console.log('Widget script loaded');

        window.NETOMI_WEB_WIDGET.init(() => {

          console.log('Widget initialized');

        });

      };

    })();



    // LOGIN WITH 2 MINUTE TOKEN
    async function handleAuth() {

      try {

        console.log('Fetching JWT token...');

        const tokenApiCall = await fetch(
          'https://chatapps-qa-a.netomi.com/api/fetchJWT',
          {
            method: 'POST',

            headers: {

              'href':
                'https://revanshasti.github.io/Hosting-sites/Authentication.html',

              'Content-Type': 'application/json',

              // TOKEN EXPIRES IN 2 MINUTES
              'x-token-expiry': '2m',

              'x-bot-ref-id':
                'a5addd98-2627-437b-899c-2f97ff2e2b18',

              'x-user-details': JSON.stringify({
                name: 'Revan Shasti',
                externalId: 'revan@gmail.com'
              })

            }
          }
        );



        const { token } = await tokenApiCall.json();

        console.log('JWT token received');



        // LOGIN ONLY ONCE
        // NO TOKEN RENEWAL
        // NO jwtAuth()
        // NO setInterval()

        window.NETOMI_WEB_WIDGET.authModule.login(token);



        console.log(
          'User authenticated successfully'
        );



        console.log(
          'Wait 2+ minutes and send a message in widget'
        );



        console.log(
          'Backend should throw JWT expired internally'
        );



        console.log(
          'Verify DataDog does NOT log jwt expired error'
        );

      }

      catch (error) {

        console.error(
          'Authentication failed:',
          error
        );

      }

    }



    function endAuth() {

      try {

        window.NETOMI_WEB_WIDGET.authModule.logout();

        console.log('User logged out');

      }

      catch (error) {

        console.error(
          'Logout failed:',
          error
        );

      }

    }

  </script>

</body>

</html>

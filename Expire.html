<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Standards" />
  <title>Web Chat</title>
</head>

<body>

  <button onclick="handleAuth()">
    Start Authentication
  </button>

  <button onclick="endAuth()">
    Clear Authentication
  </button>

  <script>

    // LOAD NETOMI WIDGET
    (function () {

      var ns = document.createElement('script');

      ns.src = 'https://chatapps-qa-a.netomi.com/app/script.js';
      ns.type = 'text/javascript';
      ns.async = true;

      ns.setAttribute(
        'botRefId',
        'a5addd98-2627-437b-899c-2f97ff2e2b18'
      );

      var s = document.getElementsByTagName('script')[0];

      s.parentNode.insertBefore(ns, s);

      ns.onload = function () {

        console.log('Widget script loaded');

        window.NETOMI_WEB_WIDGET.init(() => {

          console.log('Widget initialized');

        });
      };

    })();


    let tokenExpired = false;


    async function handleAuth() {

      try {

        // CHECK IF WIDGET IS READY
        if (!window.NETOMI_WEB_WIDGET) {

          console.error('Widget not initialized yet');

          return;
        }

        console.log('Fetching JWT token...');

        // INITIAL TOKEN CALL
        const tokenApiCall = await fetch(
          'https://chatapps-qa-a.netomi.com/api/fetchJWT',
          {
            method: 'POST',
            headers: {
              'href':
                'https://revanshasti.github.io/Hosting-sites/Authentication.html',

              'Content-Type': 'application/json',

              'x-token-expiry': '2m',

              'x-bot-ref-id':
                'a5addd98-2627-437b-899c-2f97ff2e2b18',

              'x-user-details': JSON.stringify({
                name: 'Revan Shasti',
                externalId: 'revan@gmail.com'
              })
            }
          }
        );

        const { token } = await tokenApiCall.json();

        console.log('JWT token received');

        // LOGIN USER
        window.NETOMI_WEB_WIDGET.authModule.login(token);

        console.log('User authenticated successfully');



        // TOKEN EXPIRES AFTER 2 MINUTES
        setTimeout(() => {

          tokenExpired = true;

          console.error('Token expired after 2 minutes');



          // REGISTER FAILED TOKEN REFRESH
          window.NETOMI_WEB_WIDGET.authModule.jwtAuth(
            async sendTokenToNetomi => {

              console.error(
                'Widget requested token refresh after expiry'
              );

              console.error(
                'Session failed because token is expired'
              );

              // SEND INVALID TOKEN
              sendTokenToNetomi({
                token: null
              });

            }
          );

        }, 120000);

      } catch (error) {

        console.error(
          'Authentication failed:',
          error
        );

      }
    }



    function endAuth() {

      try {

        window.NETOMI_WEB_WIDGET.authModule.logout();

        console.log('User logged out');

      } catch (error) {

        console.error(
          'Logout failed:',
          error
        );

      }
    }

  </script>

</body>

</html>

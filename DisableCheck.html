<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netomi Debug</title>
</head>

<body>

<button onclick="Netomi.chat.openWidget()">
    Open Widget
</button>

<script>
(function () {

    var ns = document.createElement('script');
    ns.src = 'https://chatapps-qa-a.netomi.com/app/script.js';
    ns.type = 'text/javascript';
    ns.async = true;

    ns.setAttribute('botRefId', '07980c42-8628-4c0f-8c91-2590abf8e5ab');
    ns.setAttribute('enableEventQueue', 'true');

    var s = document.getElementsByTagName('script')[0];
    s.parentNode.insertBefore(ns, s);

    ns.onload = function () {

        console.log("Netomi script loaded");

        window.NETOMI_WEB_WIDGET.init(() => {

            console.log("Widget initialized");

            // 1. Listen for possible custom widget events
            window.addEventListener("*", function (e) {
                console.log("Wildcard Event:", e);
            });

            // 2. Listen for postMessage events
            window.addEventListener("message", function(event) {

                console.log("=================================");
                console.log("WINDOW MESSAGE RECEIVED");
                console.log("Origin:", event.origin);
                console.log("Data:", event.data);
                console.log("=================================");

            });

            // 3. Poll possible Netomi event queue
            setInterval(() => {

                if (window.NETOMI_EVENT_QUEUE) {
                    console.log(
                        "NETOMI_EVENT_QUEUE:",
                        window.NETOMI_EVENT_QUEUE
                    );
                }

            }, 2000);

            // 4. Inspect Netomi object
            console.log("Netomi Object:", window.Netomi);

        });

    };

})();
</script>

</body>
</html>

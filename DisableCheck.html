<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netomi Widget Auto Close</title>
</head>

<body>

<button onclick="Netomi.chat.openWidget()">
    Support
</button>

<script>
(function () {

    var ns = document.createElement('script');
    ns.src = 'https://chatapps-qa-a.netomi.com/app/script.js';
    ns.type = 'text/javascript';
    ns.async = true;

    ns.setAttribute('botRefId', '07980c42-8628-4c0f-8c91-2590abf8e5ab');
    ns.setAttribute('enableEventQueue', 'true');

    var s = document.getElementsByTagName('script')[0];
    s.parentNode.insertBefore(ns, s);

    ns.onload = function () {

        console.log("Netomi script loaded");

        window.NETOMI_WEB_WIDGET.init(() => {

            console.log("Widget initialized");

            window.addEventListener("message", function(event) {

                const eventType = event?.data?.event?.eventType;

                if (!eventType) return;

                console.log("Netomi Event:", eventType);

                const closeEvents = [
                    "SURVEY_SKIPPED",
                    "SURVEY_SUBMITTED",
                    "END_CHAT_PILL"
                ];

                if (closeEvents.includes(eventType)) {

                    console.log(
                        eventType + " detected -> closing widget"
                    );

                    window.Netomi.chat.closeWidget();
                }

            });

        });

    };

})();
</script>

</body>
</html>
